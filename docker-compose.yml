services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3090}:3090"
    environment:
      - NODE_ENV=production
      - PORT=3090
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AI_MODEL=${AI_MODEL:-anthropic/claude-sonnet-4}
      - API_KEY=${API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-120000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      - CREATE_JOB_LIMIT=${CREATE_JOB_LIMIT:-10}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - NODE_ENV=production
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AI_MODEL=${AI_MODEL:-anthropic/claude-sonnet-4}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-120000}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-2}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
